# Production — builds and runs the full stack on the deployment server.
# Usage: docker compose -f docker-compose.prod.yml up -d --build

services:
  frontend:
    build:
      context: ./Frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - app

  app:
    build:
      context: ./Backend
      target: app
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      APP_NAME: CivilRegistry
      APP_ENV: production
      APP_KEY: base64://vUsQ71OLB9FWwG4JZBgW6sC5cxOYTwrbq7B8mqJv0=
      APP_DEBUG: "false"
      APP_URL: http://134.209.105.170
      FRONTEND_URL: http://134.209.105.170:3000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: civil_registry
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      MONGO_HOST: mongo
      MONGO_PORT: 27017
      MONGO_DATABASE: civil_registry_docs
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      MAIL_MAILER: ${MAIL_MAILER:-log}
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: sina015772825@gmail.com
      MAIL_PASSWORD: "gdxm ytrt ksxm scwm"
      MAIL_ENCRYPTION: tls
      MAIL_FROM_ADDRESS: sina015772825@gmail.com
      MAIL_FROM_NAME: CivilRegistry
      RUN_MIGRATIONS: "true"
    depends_on:
      - postgres
      - mongo
      - redis
    volumes:
      - app-storage:/var/www/html/storage/app
      - app-logs:/var/www/html/storage/logs

  postgres:
    build:
      context: ./Backend/docker/postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: civil_registry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command: postgres -c config_file=/etc/postgresql/pgbadger.conf
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - pg-logs:/var/log/postgresql

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodata:/data/db

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  app-storage:
  app-logs:
  pgdata:
  pg-logs:
  mongodata:
  redisdata:
