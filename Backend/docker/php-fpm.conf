; Forward PHP worker stdout/stderr to the php-fpm master's error log (stderr),
; which supervisord streams to the container's stdout. This is what makes
; Log::info(...) on the `stderr` channel — and the `log` mail driver's OTP
; output — visible in `docker compose logs app`.
[global]
error_log = /proc/self/fd/2

[www]
catch_workers_output = yes
decorate_workers_output = no
