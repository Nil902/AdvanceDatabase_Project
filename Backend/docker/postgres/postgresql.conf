# PostgreSQL configuration optimized for pgBadger log analysis
# Include this via the postgres container command or config_file parameter.

# --- Networking — allow connections from other containers -------------------
listen_addresses = '*'

# --- Logging for pgBadger ---------------------------------------------------
logging_collector = on
log_destination = 'stderr'
log_directory = '/var/log/postgresql'
log_filename = 'postgresql-%Y-%m-%d.log'
log_rotation_age = 1d
log_rotation_size = 0
log_truncate_on_rotation = on

# pgBadger requires this prefix format
log_line_prefix = '%t [%p]: user=%u,db=%d,app=%a,client=%h '

# What to log
log_min_duration_statement = 0
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 0

# Statement logging
log_statement = 'none'
lc_messages = 'en_US.UTF-8'
