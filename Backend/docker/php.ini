; Production-leaning defaults — tune based on your droplet's actual RAM.

memory_limit = 256M
upload_max_filesize = 20M
post_max_size = 20M
max_execution_time = 60

; Opcache — biggest single win for Laravel request latency in production
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0
; validate_timestamps=0 means code changes need a container restart to take
; effect — correct for prod (immutable images), wrong for local dev.

; Don't expose PHP version in response headers
expose_php = Off

date.timezone = Asia/Phnom_Penh
